<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>剑一 Unit 5 单词复习小游戏 - Jessie老师英语工作室</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
html,body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: "幼圆", "Microsoft YaHei", sans-serif;
    background: #fdf7f0;
}

.top-header {
    width: 100%;
    background: #ffffff;
    padding: 20px 15px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(251, 189, 4, 0.1);
}
.main-title {
    font-size: 24px;
    color: #d97706;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}
.decor-icon {
    color: #f59e0b;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    0% {transform: scale(1); opacity: 0.8;}
    100% {transform: scale(1.2); opacity: 1;}
}
.game-subtitle {
    font-size: 20px;
    color: #333;
    font-weight: bold;
}

.game-container {
    width: 100%;
    flex: 1;
    min-height: 50vh;
    margin: 15px 0;
    overflow: hidden;
    border: 4px solid #fcd34d;
    border-radius: 8px;
    position: relative;
}
.game-iframe {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    transform: translateY(-80px);
    border: none;
}

.qrcode-section {
    width: 100%;
    background: #ffffff;
    padding: 25px 15px;
    text-align: center;
    margin-top: 10px;
}
.qrcode-title {
    font-size: 18px;
    color: #333;
    margin-bottom: 12px;
    font-weight: bold;
}
.qrcode-img {
    width: 180px;
    height: 180px;
    border: 3px solid #fcd34d;
    border-radius: 8px;
    margin: 0 auto;
}
.qrcode-desc {
    margin-top: 10px;
    font-size: 16px;
    color: #666;
}

body {
    display: flex;
    flex-direction: column;
}

@media (max-width: 768px) {
    .main-title {font-size: 20px;}
    .game-subtitle {font-size: 18px;}
    .qrcode-img {width: 160px; height: 160px;}
}
</style>
</head>
<body>
<header class="top-header">
    <div class="main-title">
        <i class="fa-solid fa-thumbs-up decor-icon"></i>
        <span>Jessie老师英语工作室定制</span>
        <i class="fa-solid fa-thumbs-up decor-icon"></i>
    </div>
    <div class="game-subtitle">剑一 Unit 5 单词复习小游戏</div>
</header>

<div class="game-container">
    <iframe src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/document/DLDwxVBEAaLVEjgYN6PSjg.html" class="game-iframe"></iframe>
</div>

<section class="qrcode-section">
    <div class="qrcode-title">📱 扫码联系Jessie老师</div>
    <img src="https://s41.ax1x.com/2026/04/28/pe5xIL6.jpg" alt="教师二维码" class="qrcode-img">
    <div class="qrcode-desc">获取更多英语趣味游戏和学习资料</div>
</section>
</body>
</html>
